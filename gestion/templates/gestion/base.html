<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Docente{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body { font-family: 'DM Sans', system-ui, sans-serif; }

        /* details animation */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: gc-reveal 0.22s ease; }
        @keyframes gc-reveal {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Display font */
        .font-display { font-family: 'Bricolage Grotesque', sans-serif; }

        /* Subtle page background texture */
        body {
            background-color: #F8F7F4;
            background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.04) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* Scrollbar slim */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>
<body class="min-h-screen text-slate-800 selection:bg-indigo-100 selection:text-indigo-900">

    <!-- NAV -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200/70 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-14">

                <!-- Logo -->
                <a href="{% url 'gestion:lista_cursos' %}" class="flex items-center gap-2.5 group">
                    <div class="h-8 w-8 rounded-lg bg-slate-900 flex items-center justify-center shadow-sm group-hover:bg-indigo-600 transition-colors duration-200">
                        <i class="fa-solid fa-graduation-cap text-white text-[13px]"></i>
                    </div>
                    <span class="font-display font-bold text-slate-900 text-lg leading-none tracking-tight">
                        Docente<span class="text-indigo-500">.</span>
                    </span>
                </a>

                <!-- Links -->
                <div class="flex items-center gap-1">
                    <a href="{% url 'gestion:lista_cursos' %}" class="flex items-center gap-2 px-3.5 py-2 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-100 transition-colors">
                        <i class="fa-solid fa-layer-group text-[11px] text-slate-400"></i>
                        <span class="hidden sm:inline">Mis Cursos</span>
                    </a>
                    <a href="#" class="flex items-center gap-2 px-3.5 py-2 rounded-lg text-sm font-medium text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition-colors">
                        <i class="fa-solid fa-chart-pie text-[11px] text-slate-400"></i>
                        <span class="hidden sm:inline">Reportes</span>
                    </a>

                    <div class="w-px h-5 bg-slate-200 mx-1.5"></div>

                    <!-- Avatar -->
                    <div class="h-8 w-8 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center text-[11px] font-bold border border-indigo-100">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="max-w-6xl mx-auto py-8 px-4 sm:px-6">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
